# docker-compose.yml — 云端 LLM + 本地 Reranker/Embedding
#
# 适用场景：没有大显存 GPU，LLM 走云端 API（DeepSeek 等），
# Embedding 走 Ollama 或外部服务，Reranker 本地 TEI。
#
# 用法：
#   cp .env.example .env  # 填写云端 API 密钥
#   docker compose up -d
#   docker compose up -d --build frontend  # 重建前端

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    command: ["--model-id", "${DELPHI_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"]
    ports:
      - "8082:80"
    volumes:
      - ~/.cache/huggingface:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # vllm + embedding 用 busybox 占位（实际走云端/外部服务）
  vllm:
    image: busybox
    command: sh -c 'echo "vllm disabled — using cloud API" && exec httpd -f -p 8000 -h /tmp'
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 5s
      timeout: 2s
      retries: 1

  embedding:
    image: busybox
    command: sh -c 'echo "embedding disabled — using external service" && exec httpd -f -p 80 -h /tmp'
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 5s
      timeout: 2s
      retries: 1

  api:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - /home/kent:/mnt/host:ro
    environment:
      - DELPHI_VLLM_URL=${DELPHI_VLLM_URL:-https://api.deepseek.com}
      - DELPHI_QDRANT_URL=${DELPHI_QDRANT_URL:-http://qdrant:6333}
      - DELPHI_EMBEDDING_URL=${DELPHI_EMBEDDING_URL:-http://embedding:80}
      - DELPHI_EMBEDDING_BACKEND=${DELPHI_EMBEDDING_BACKEND:-ollama}
      - DELPHI_LLM_API_KEY=${DELPHI_LLM_API_KEY:-}
      - DELPHI_LLM_MODEL=${DELPHI_LLM_MODEL:-deepseek-chat}
      - DELPHI_EMBEDDING_MODEL=${DELPHI_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - DELPHI_RERANKER_URL=http://reranker:80
      - DELPHI_RERANKER_MODEL=${DELPHI_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - DELPHI_API_KEY=${DELPHI_API_KEY:-}
      - DELPHI_OTEL_ENABLED=${DELPHI_OTEL_ENABLED:-false}
      - DELPHI_OTEL_ENDPOINT=${DELPHI_OTEL_ENDPOINT:-http://jaeger:4317}
      - DELPHI_OTEL_SERVICE_NAME=${DELPHI_OTEL_SERVICE_NAME:-delphi}
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./web
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy

  # --- 可选：OpenTelemetry 追踪后端 ---
  # 启动方式：docker compose --profile otel up -d
  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["otel"]
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  qdrant_data:

networks:
  default:
    name: delphi_net
